<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quantum Island Sandbox{% endblock %}</title>
    <meta name="description" content="Quantum Sandbox: A procedural generation playground for islands and interior floor plans.">
    <meta name="keywords" content="Wave Function Collapse, WFC, Procedural Generation, Quantum Sandbox">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://waves.byomz.dev/">
    <meta property="og:title" content="Quantum Sandbox">
    <meta property="og:description" content="A procedural generation playground for islands and interior floor plans.">
    <meta property="og:image" content="https://waves.byomz.dev/favicon.png">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') if url_for is defined else './favicon.png' }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') if url_for is defined else './style.css' }}">
    {% block extra_css %}{% endblock %}
    <style>
        /* Mobile Navbar Scroll Fix */
        @media (max-width: 600px) {
            .navbar {
                padding: 0.5rem 1rem !important;
            }
            .nav-links {
                overflow-x: auto;
                white-space: nowrap;
                flex-wrap: nowrap;
                gap: 1.5rem;
                padding-bottom: 5px; /* Space for scrollbar if visible */
                width: 100%;
                justify-content: flex-start;
                -webkit-overflow-scrolling: touch;
            }
            .nav-links::-webkit-scrollbar {
                display: none; /* Hide scrollbar for a cleaner feel */
            }
            .nav-brand {
                display: none; /* Hide brand on very small screens to give room to links */
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Wave Function Collapse</div>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.endpoint == 'index' %}active{% endif %}">Island Generation</a></li>
            <li><a href="/floors" class="{% if request.endpoint == 'floor_plan' %}active{% endif %}">Floor Plan Generation</a></li>
            <li><a href="/about" class="{% if request.endpoint == 'about' %}active{% endif %}">How it was made</a></li>
        </ul>
    </nav>

    <div class="app-container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
