<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quantum Island Sandbox{% endblock %}</title>
    <meta name="description" content="Quantum Sandbox: A procedural generation playground for islands and interior floor plans.">
    <meta name="keywords" content="Wave Function Collapse, WFC, Procedural Generation, Quantum Sandbox">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://waves.byomz.dev/">
    <meta property="og:title" content="Quantum Sandbox">
    <meta property="og:description" content="A procedural generation playground for islands and interior floor plans.">
    <meta property="og:image" content="https://waves.byomz.dev/favicon.png">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') if url_for is defined else './favicon.png' }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') if url_for is defined else './style.css' }}">
    {% block extra_css %}{% endblock %}
    <style>
        /* Mobile Navbar Scroll Fix */
        @media (max-width: 600px) {
            .navbar {
                padding: 0.5rem 1rem !important;
                flex-direction: column;
                align-items: flex-start !important;
                gap: 0.5rem;
            }
            .nav-links {
                overflow-x: auto;
                white-space: nowrap;
                flex-wrap: nowrap;
                gap: 1.5rem;
                padding-bottom: 8px; 
                width: 100%;
                justify-content: flex-start;
                -webkit-overflow-scrolling: touch;
            }
            .nav-links::-webkit-scrollbar {
                display: none;
            }
            .nav-brand {
                font-size: 1.2rem;
            }
            .navbar-left {
                width: 100%;
                justify-content: space-between;
                display: flex;
                align-items: center;
            }
        }

        /* Theme Toggle Styling */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            padding: 0;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background-color: var(--bg-panel);
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        html.light-mode .theme-toggle .icon-sun { display: block; }
        html.light-mode .theme-toggle .icon-moon { display: none; }
    </style>
    <!-- Anti-FOUC Script -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left" style="display: flex; align-items: center; gap: 1.5rem;">
            <div class="nav-brand">Wave Function Collapse</div>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{% if request.endpoint == 'index' %}active{% endif %}">Island Generation</a></li>
            <li><a href="/floors" class="{% if request.endpoint == 'floor_plan' %}active{% endif %}">Floor Plan Generation</a></li>
            <li><a href="/about" class="{% if request.endpoint == 'about' %}active{% endif %}">How it was made</a></li>
        </ul>
    </nav>

    <div class="app-container">
        {% block content %}{% endblock %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const isLight = document.documentElement.classList.toggle('light-mode');
                    localStorage.setItem('theme', isLight ? 'light' : 'dark');
                    console.log('Theme toggled to:', isLight ? 'light' : 'dark');
                });
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
